<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso de Clientes</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
    </div>

    <div class="container">
        <div class="glass-form-container">
            <h1 class="title">Portal de Clientes</h1>
            <p class="subtitle">Ingresa tus datos para continuar</p>

            <form id="clienteForm">
                <div class="input-group">
                    <label for="numeroCliente">Número del Cliente</label>
                    <input type="text" id="numeroCliente" name="numeroCliente" placeholder="Cualquier número o mensaje"
                        required autocomplete="off">
                </div>

                <div class="input-group">
                    <label for="correo">Correo Electrónico</label>
                    <input type="text" id="correo" name="correo"
                        placeholder="correo@ejemplo.com (Opcional o cualquier mensaje)" required autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="contrasena">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="contrasena" name="contrasena" placeholder="Tu contraseña secreta"
                            required autocomplete="current-password">
                    </div>
                </div>

                <div class="input-group">
                    <label>Tipo de Usuario (Selección Opcional)</label>
                    <div class="radio-group">
                        <input type="radio" id="btnMaster" name="tipoUsuario" value="Master">
                        <label for="btnMaster" class="radio-btn">Master</label>

                        <input type="radio" id="btnNoMaster" name="tipoUsuario" value="No Master">
                        <label for="btnNoMaster" class="radio-btn">No Master</label>
                    </div>
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">Ingresar y Guardar</span>
                    <span class="loader" style="display: none;"></span>
                </button>
            </form>

            <div id="statusMessage" class="hidden"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
